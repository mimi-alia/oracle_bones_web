<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles.css">
    <title>Divination Space</title>
</head>
<body>
    <section class="frontroom container">
        <h1 class="frontroom">Select your character</h1>
        <section id="character-selection" class="frontroom horizontal-layout"></section>
    </section>
    <section id="selection-view">
        <button id="definitions">Define</button>
        <button id="selection-back">← Back</button>
        <button id="details">Details</button>
        <section id="selected-character-container" class="horizontal-layout">
            <div id="character-draw"></div>
            <div id="character-reference"></div>
        </section>
    </section>
    <section id="definitions-view">
        <button id="def-back">← Back</button>
        <h1>Charm (etymology etc)</h1>
        <div>
            <table></table>
        </div>
    </section>
    <section id="detail-view">
        <h1>Hover over the circles for additional info</h1>
        <button id="detail-back">← Back</button>
        <div></div>
    </section>
    <script src="../src/divination.js "></script>
    <!-- <script src="../scripts.js"></script> --> 
</body>
</html>
